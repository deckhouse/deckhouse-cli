name: Release

on:
  create:
    tags:
      - v*
  pull_request:
    branches:
      - "main"

env:
  GOPRIVATE: "flant.internal"
  PRIVATE_REPO: "${{secrets.DECKHOUSE_PRIVATE_REPO}}"
  GOLANGCI_LINT_VERSION: 'v2.11.4'

permissions:
  contents: write

# Cancel in-progress jobs for the same PR (pull_request_target event) or for the same branch (push event).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, regular]
    strategy:
      matrix:
        arch: [amd64, arm64]
    container:
      image: ubuntu:22.04
    steps:
      - name: Install dependency for linux-amd64 dist
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y \
            apt-utils \
            libbtrfs-dev \
            libelf-dev    `# delivery-kit: ELF binary signature support (CGO)` \
            libssl-dev    `# delivery-kit: OpenSSL crypto for signature verification (CGO)` \
            libuv1-dev    `# delivery-kit: async I/O for libuv-based networking (CGO)` \
            libzstd-dev   `# delivery-kit: zstd compression support (CGO)` \
            file git gcc dnsutils

          # If building for arm64 on amd64 host, install cross-compiler and arm64 libs
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "Setting up cross-compilation for arm64"
            dpkg --add-architecture arm64
            apt-get update
            apt-get install -y \
              gcc-aarch64-linux-gnu \
              libbtrfs-dev:arm64 \
              libelf-dev:arm64 \
              libssl-dev:arm64 \
              libuv1-dev:arm64 \
              libzstd-dev:arm64
            
            # libuv1-dev ships static lib as libuv_a.a; the linker expects libuv.a for arm64
            libuv_path=$(dpkg -L libuv1-dev:arm64 | grep -F '/libuv_a.a')
            if [ -n "$libuv_path" ]; then
              mkdir -p /usr/local/lib
              ln -fs "$libuv_path" /usr/local/lib/libuv.a
            fi
          else
            # libuv1-dev ships static lib as libuv_a.a; the linker expects libuv.a for amd64
            libuv_path=$(dpkg -L libuv1-dev | grep -F '/libuv_a.a')
            if [ -n "$libuv_path" ]; then
              mkdir -p /usr/local/lib
              ln -fs "$libuv_path" /usr/local/lib/libuv.a
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # To use `git describe --tags`

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # Cache download takes longer that a build from scratch

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{secrets.SOURCE_REPO_SSH_KEY}}
            
      - name: Add ssh_known_hosts
        run: |
          echo "::add-mask::$PRIVATE_REPO"
          IPS=$(nslookup "$PRIVATE_REPO" | awk '/^Address: / { print $2 }')
          for IP in $IPS; do
            echo "::add-mask::$IP"
          done
          mkdir -p /root/.ssh
          touch /root/.ssh/known_hosts
          HOST_KEYS=$(ssh-keyscan -H "$PRIVATE_REPO" 2>/dev/null)
          echo "$HOST_KEYS" | while IFS= read -r KEY_LINE; do
            CONSTANT_PART=$(echo "$KEY_LINE" | awk '{print $2, $3}')
            if ! grep -q "$CONSTANT_PART" /root/.ssh/known_hosts; then
              echo "$KEY_LINE" >> /root/.ssh/known_hosts
            fi
          done

      - name: Setup git
        run: |
          git config --global url."ssh://git@${PRIVATE_REPO}/".insteadOf "https://flant.internal/"
          git config --global --add safe.directory '*'

      - name: Build and package
        env:
          # Set Cross-Compilation vars for arm64
          CC: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
        run: task build-and-package:${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ matrix.arch }}
          path: dist/**/*
          retention-days: 1

  # Separate job for creating the release, waiting for all architectures to finish
  create-release:
    needs: release
    runs-on: [self-hosted, regular]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-dist-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256sum


  # Running tests on a single architecture
  test:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, regular]
    container:
      image: ubuntu:22.04
    steps:
      - name: Install dependency for linux-amd64 dist
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y \
            apt-utils \
            libbtrfs-dev \
            libelf-dev    `# delivery-kit: ELF binary signature support (CGO)` \
            libssl-dev    `# delivery-kit: OpenSSL crypto for signature verification (CGO)` \
            libuv1-dev    `# delivery-kit: async I/O for libuv-based networking (CGO)` \
            libzstd-dev   `# delivery-kit: zstd compression support (CGO)` \
            file git gcc dnsutils
          # libuv1-dev ships static lib as libuv_a.a; the linker expects libuv.a
          ln -fs "$(dpkg -L libuv1-dev | grep -F '/libuv_a.a')" /usr/local/lib/libuv.a

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # To use `git describe --tags`

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # Cache download takes longer that a build from scratch

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{secrets.SOURCE_REPO_SSH_KEY}}

      - name: Add ssh_known_hosts
        run: |
          echo "::add-mask::$PRIVATE_REPO"
          IPS=$(nslookup "$PRIVATE_REPO" | awk '/^Address: / { print $2 }')
          for IP in $IPS; do
            echo "::add-mask::$IP"
          done
          mkdir -p /root/.ssh
          touch /root/.ssh/known_hosts
          HOST_KEYS=$(ssh-keyscan -H "$PRIVATE_REPO" 2>/dev/null)
          echo "$HOST_KEYS" | while IFS= read -r KEY_LINE; do
            CONSTANT_PART=$(echo "$KEY_LINE" | awk '{print $2, $3}')
            if ! grep -q "$CONSTANT_PART" /root/.ssh/known_hosts; then
              echo "$KEY_LINE" >> /root/.ssh/known_hosts
            fi
          done
          
      - name: Setup git
        run: |
          git config --global url."ssh://git@${PRIVATE_REPO}/".insteadOf "https://flant.internal/"
          git config --global --add safe.directory '*'

      - name: Run tests
        run: |
          task test


  # Running lint on a single architecture
  lint:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, regular]
    continue-on-error: true
    container:
      image: ubuntu:22.04
    name: Lint
    steps:
      - name: Install dependency for linux-amd64 dist
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y \
            apt-utils \
            libbtrfs-dev \
            libelf-dev    `# delivery-kit: ELF binary signature support (CGO)` \
            libssl-dev    `# delivery-kit: OpenSSL crypto for signature verification (CGO)` \
            libuv1-dev    `# delivery-kit: async I/O for libuv-based networking (CGO)` \
            libzstd-dev   `# delivery-kit: zstd compression support (CGO)` \
            file git gcc dnsutils
          # libuv1-dev ships static lib as libuv_a.a; the linker expects libuv.a
          ln -fs "$(dpkg -L libuv1-dev | grep -F '/libuv_a.a')" /usr/local/lib/libuv.a

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # To use `git describe --tags`

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # Cache download takes longer that a build from scratch

      - name: Setup GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: 'true'
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{secrets.SOURCE_REPO_SSH_KEY}}

      - name: Add ssh_known_hosts
        run: |
          echo "::add-mask::$PRIVATE_REPO"
          IPS=$(nslookup "$PRIVATE_REPO" | awk '/^Address: / { print $2 }')
          for IP in $IPS; do
            echo "::add-mask::$IP"
          done
          mkdir -p /root/.ssh
          touch /root/.ssh/known_hosts
          HOST_KEYS=$(ssh-keyscan -H "$PRIVATE_REPO" 2>/dev/null)
          echo "$HOST_KEYS" | while IFS= read -r KEY_LINE; do
            CONSTANT_PART=$(echo "$KEY_LINE" | awk '{print $2, $3}')
            if ! grep -q "$CONSTANT_PART" /root/.ssh/known_hosts; then
              echo "$KEY_LINE" >> /root/.ssh/known_hosts
            fi
          done
          
      - name: Setup git
        run: |
          git config --global url."ssh://git@${PRIVATE_REPO}/".insteadOf "https://flant.internal/"
          git config --global --add safe.directory '*'

      - name: Run lint
        run: |
          task lint:check


  pr-build:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, regular]
    strategy:
      matrix:
        arch: [amd64, arm64]
    container:
      image: ubuntu:22.04
    name: Build for PR
    steps:
      - name: Install dependency for linux-amd64 dist
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y \
            apt-utils \
            libbtrfs-dev \
            libelf-dev    `# delivery-kit: ELF binary signature support (CGO)` \
            libssl-dev    `# delivery-kit: OpenSSL crypto for signature verification (CGO)` \
            libuv1-dev    `# delivery-kit: async I/O for libuv-based networking (CGO)` \
            libzstd-dev   `# delivery-kit: zstd compression support (CGO)` \
            file git gcc dnsutils

          # Cross-compilation setup for arm64
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "Setting up cross-compilation for arm64"
            dpkg --add-architecture arm64
            apt-get update
            apt-get install -y \
              gcc-aarch64-linux-gnu \
              libbtrfs-dev:arm64 \
              libelf-dev:arm64 \
              libssl-dev:arm64 \
              libuv1-dev:arm64 \
              libzstd-dev:arm64
            
            # libuv1-dev ships static lib as libuv_a.a; the linker expects libuv.a for arm64
            libuv_path=$(dpkg -L libuv1-dev:arm64 | grep -F '/libuv_a.a')
            if [ -n "$libuv_path" ]; then
              mkdir -p /usr/local/lib
              ln -fs "$libuv_path" /usr/local/lib/libuv.a
            fi
          else
            # libuv1-dev ships static lib as libuv_a.a; the linker expects libuv.a for amd64
            libuv_path=$(dpkg -L libuv1-dev | grep -F '/libuv_a.a')
            if [ -n "$libuv_path" ]; then
              mkdir -p /usr/local/lib
              ln -fs "$libuv_path" /usr/local/lib/libuv.a
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # To use `git describe --tags`

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # Cache download takes longer that a build from scratch

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{secrets.SOURCE_REPO_SSH_KEY}}
            
      - name: Add ssh_known_hosts
        run: |
          echo "::add-mask::$PRIVATE_REPO"
          IPS=$(nslookup "$PRIVATE_REPO" | awk '/^Address: / { print $2 }')
          for IP in $IPS; do
            echo "::add-mask::$IP"
          done
          mkdir -p /root/.ssh
          touch /root/.ssh/known_hosts
          HOST_KEYS=$(ssh-keyscan -H "$PRIVATE_REPO" 2>/dev/null)
          echo "$HOST_KEYS" | while IFS= read -r KEY_LINE; do
            CONSTANT_PART=$(echo "$KEY_LINE" | awk '{print $2, $3}')
            if ! grep -q "$CONSTANT_PART" /root/.ssh/known_hosts; then
              echo "$KEY_LINE" >> /root/.ssh/known_hosts
            fi
          done

      - name: Setup git
        run: |
          git config --global url."ssh://git@${PRIVATE_REPO}/".insteadOf "https://flant.internal/"
          git config --global --add safe.directory '*'

      # Build specific architecture, since the container is already running for that arch
      - name: Build and package
        env:
          CC: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
        run: task build:dist:all:${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deckhouse-cli-pr-build-${{ matrix.arch }}-${{ github.run_id }}
          path: dist/**/*
          retention-days: 1
          compression-level: 9
