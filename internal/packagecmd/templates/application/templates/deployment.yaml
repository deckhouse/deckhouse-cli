{{- define "server_resources" }}
cpu: 30m
memory: 70Mi
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Application.Instance.Name }}-server
spec:
  revisionHistoryLimit: 2
  replicas: {{ .Application.Settings.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .Application.Instance.Name }}-server
  template:
    metadata:
      labels:
        app: {{ .Application.Instance.Name }}-server
    spec:
      priorityClassName: develop
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: {{ .Application.Instance.Name }}-registrysecret
      containers:
        - name: server
          image: {{ index .Application.Package.Images "echo" }}
          imagePullPolicy: IfNotPresent
          args:
            - -text={{ .Application.Settings.msg | default "hello world" | quote}}
          env:
            # Example of the quantity_bytes helper: turns the ephemeral-storage
            # request "50Mi" into a plain byte count for the app to consume.
            - name: EPHEMERAL_STORAGE_BYTES
              value: {{ include "quantity_bytes" "50Mi" | quote }}
            # Round-trip example: parse the memory request into bytes, take half
            # of it for an in-memory cache, then format the result back into a
            # Kubernetes quantity with the bytes_quantity helper.
            {{- $memBytes := include "quantity_bytes" "70Mi" | int64 }}
            {{- $cacheBytes := mulf (float64 $memBytes) 0.5 | floor | int64 }}
            - name: CACHE_MAX_BYTES
              value: {{ $cacheBytes | quote }}
            - name: CACHE_MAX_SIZE
              value: {{ include "bytes_quantity" $cacheBytes | quote }}
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          resources:
            requests:
              ephemeral-storage: 50Mi
              {{- include "server_resources" . | nindent 14 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
