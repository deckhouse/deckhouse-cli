version: "3"

vars:
  mode: '{{ ternary "cgo" "go" (eq OS "linux") }}'
  arch: '{{ ternary "arm64" ARCH (eq ARCH "arm") }}'
  buildDate:
    sh: date -u +'%Y-%m-%dT%H:%M:%SZ'
  version:
    sh: git describe --tags
  kubectlVersion: v1.34.8
  kubectlLDFlags:
    sh: |
      buildDate="{{ .buildDate }}"
      gitCommit="0000000000000000000000000000000000000000"
      gitTreeState="archive"
      gitVersion="{{ .kubectlVersion }}"
      _strippedGitVersion="${gitVersion#[vV]}"
      gitMajor="$(cut -d. -f1 <<< "$_strippedGitVersion")"
      gitMinor="$(cut -d. -f2 <<< "$_strippedGitVersion")"

      declare -a ldflags
      function add_ldflag() {
        local key=${1}
        local val=${2}
        ldflags+=(
            "-X 'k8s.io/client-go/pkg/version.${key}=${val}'"
            "-X 'k8s.io/component-base/version.${key}=${val}'"
        )
      }

      for ldflag in buildDate gitCommit gitTreeState gitVersion gitMajor gitMinor; do
        add_ldflag "${ldflag}" "${!ldflag}"
      done

      echo "${ldflags[*]-}"
  werfLDFlags:
    sh: |
      version="$(go list -m -f '{{"{{"}}.Replace.Version{{"}}"}}' github.com/werf/werf/v2)"
      echo "-X 'github.com/werf/werf/v2/pkg/werf.Version=${version}'"

  cgoTags: "clionly dfrunsecurity dfrunnetwork dfrunmount dfssh containers_image_openpgp osusergo exclude_graphdriver_devicemapper netgo no_devmapper static_build cni"
  goTags: "clionly dfrunsecurity dfrunnetwork dfrunmount dfssh containers_image_openpgp"
  testsumFormat: '{{if eq .GITHUB_ACTIONS "true"}}github-actions{{else}}pkgname-and-test-fails{{end}}'

  cgoDevLDFlags: "-linkmode external -extldflags=-static -s -w -X 'github.com/deckhouse/deckhouse-cli/internal/version.Version=local-dev' {{ .werfLDFlags }}"
  goDevLDFlags: "-s -w -X 'github.com/deckhouse/deckhouse-cli/internal/version.Version=local-dev' {{ .werfLDFlags }}"

  cgoReleaseLDFlags: "-linkmode external -extldflags=-static -s -w -X 'github.com/deckhouse/deckhouse-cli/internal/version.Version={{ .version }}' {{ .werfLDFlags }} {{ .kubectlLDFlags }}"
  goReleaseLDFlags: "-s -w -X 'github.com/deckhouse/deckhouse-cli/internal/version.Version={{ .version }}' {{ .werfLDFlags }} {{ .kubectlLDFlags }}"

tasks:
  default:
    desc: List available tasks
    silent: true
    env:
      # Emoji per task group; a new group without an entry gets a plain arrow.
      TASKLIST_EMOJI: "build=🔨 package=📦 lint=🧹 check=🔍 release=🚀 misc=🧰"
    cmds:
      # The grouped listing needs sh and awk; Windows falls back to a plain list.
      - cmd: ./tools/list-tasks.sh
        platforms: [linux, darwin]
      - cmd: task --list --sort none
        platforms: [windows]

  _build:cgo:dev:
    internal: true
    cmds:
      - go build -o "{{ .outputDir | default (printf "./build/%s-%s" .targetOS .targetArch) }}/bin/d8"
        -compiler gc -ldflags="{{ .cgoDevLDFlags }}" -tags="{{ .cgoTags }}" {{ .CLI_ARGS }} ./cmd/d8/
    env:
      CGO_ENABLED: "1"
      GOOS: "{{ .targetOS }}"
      GOARCH: "{{ .targetArch }}"

  _build:cgo:dist:
    internal: true
    cmds:
      - go build -o "{{ .outputDir | default (printf "./dist/%s/%s-%s" .version .targetOS .targetArch) }}/bin/d8"
        -compiler gc -ldflags="{{ .cgoReleaseLDFlags }}" -tags="{{ .cgoTags }}" {{ .CLI_ARGS }} ./cmd/d8/
    env:
      CGO_ENABLED: "1"
      GOOS: "{{ .targetOS }}"
      GOARCH: "{{ .targetArch }}"

  _build:go:dev:
    internal: true
    cmds:
      - go build -o "{{ .outputDir | default (printf "./build/%s-%s" .targetOS .targetArch) }}/bin/d8{{ if (eq .targetOS "windows") }}.exe{{ end }}"
        -ldflags="{{ .goDevLDFlags }}" -tags="{{ .goTags }}" {{ .CLI_ARGS }} ./cmd/d8/
    env:
      CGO_ENABLED: "0"
      GOOS: "{{ .targetOS }}"
      GOARCH: "{{ .targetArch }}"

  _build:go:dist:
    internal: true
    cmds:
      - go build -o "{{ .outputDir | default (printf "./dist/%s/%s-%s" .version .targetOS .targetArch) }}/bin/d8{{ if (eq .targetOS "windows") }}.exe{{ end }}"
        -ldflags="{{ .goReleaseLDFlags }}" -tags="{{ .goTags }}" {{ .CLI_ARGS }} ./cmd/d8/
    env:
      CGO_ENABLED: "0"
      GOOS: "{{ .targetOS }}"
      GOARCH: "{{ .targetArch }}"

  _test:go:
    internal: true
    cmds:
      - go run gotest.tools/gotestsum@latest -f {{ .testsumFormat }} -- -count=1 -tags="{{ .cgoTags }}" ./...

  _package:dist:
    internal: true
    dir: dist/{{ .version }}
    cmds:
      - cp ../../LICENSE ../../README.md {{ .target }}
      - tar -zcf d8-{{ .version }}-{{ .target }}.tar.gz {{ .target }}

  build:
    desc: Build d8 for local use (current OS/arch)
    run: once
    deps: ["check:kubectl"]
    cmds:
      - task: build:dev:{{ OS }}:{{ .arch }}
        vars:
          outputDir: "."

  build:dev:linux:amd64:
    desc: Build dev binary for linux/amd64 (requires Linux or Docker)
    cmds:
      - task: _build:cgo:dev
        vars:
          targetOS: "linux"
          targetArch: "amd64"
          outputDir: "{{ .outputDir }}"

  build:dev:linux:amd64:cross:
    desc: Cross-compile dev binary for linux/amd64 from macOS (no CGO)
    summary: |
      Cross-compiles Linux binary from macOS without CGO.

      This is useful for quick testing when you don't have access to a Linux machine
      or Docker. The resulting binary has the same features as darwin/windows builds
      (no CGO-dependent functionality).

      For a full-featured Linux build with CGO, use build:dev:linux:amd64 on Linux
      or in a Linux container.
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "linux"
          targetArch: "amd64"
          outputDir: "{{ .outputDir }}"

  build:dev:darwin:amd64:
    desc: Build dev binary for darwin/amd64
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "darwin"
          targetArch: "amd64"
          outputDir: "{{ .outputDir }}"

  build:dev:darwin:arm64:
    desc: Build dev binary for darwin/arm64
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "darwin"
          targetArch: "arm64"
          outputDir: "{{ .outputDir }}"

  build:dev:windows:amd64:
    desc: Build dev binary for windows/amd64
    cmds:
      - task: _build:go:dev
        vars:
          targetOS: "windows"
          targetArch: "amd64"
          outputDir: "{{.outputDir}}"

  build:dist:all:
    desc: Build release binaries for all platforms
    deps:
      - build:dist:linux:amd64
      - build:dist:darwin:amd64
      - build:dist:darwin:arm64
      - build:dist:windows:amd64

  build:dist:linux:amd64:
    desc: Build release binary for linux/amd64
    cmds:
      - task: _build:cgo:dist
        vars:
          targetOS: "linux"
          targetArch: "amd64"
          outputDir: "{{ .outputDir }}"

  build:dist:darwin:amd64:
    desc: Build release binary for darwin/amd64
    cmds:
      - task: _build:go:dist
        vars:
          targetOS: "darwin"
          targetArch: "amd64"
          outputDir: "{{ .outputDir }}"

  build:dist:darwin:arm64:
    desc: Build release binary for darwin/arm64
    cmds:
      - task: _build:go:dist
        vars:
          targetOS: "darwin"
          targetArch: "arm64"
          outputDir: "{{ .outputDir }}"

  build:dist:windows:amd64:
    desc: Build release binary for windows/amd64
    cmds:
      - task: _build:go:dist
        vars:
          targetOS: "windows"
          targetArch: "amd64"
          outputDir: "{{ .outputDir }}"

  package:dist:all:
    desc: Package release assets for all platforms
    deps:
      - package:dist:linux:amd64
      - package:dist:darwin:amd64
      - package:dist:darwin:arm64
      - package:dist:windows:amd64

  package:dist:linux:amd64:
    desc: Package release asset for linux/amd64
    dir: dist/{{ .version }}
    cmds:
      - task: _package:dist
        vars:
          target: "linux-amd64"

  package:dist:darwin:amd64:
    desc: Package release asset for darwin/amd64
    dir: dist/{{ .version }}
    cmds:
      - task: _package:dist
        vars:
          target: "darwin-amd64"

  package:dist:darwin:arm64:
    desc: Package release asset for darwin/arm64
    dir: dist/{{ .version }}
    cmds:
      - task: _package:dist
        vars:
          target: "darwin-arm64"

  package:dist:windows:amd64:
    desc: Package release asset for windows/amd64
    dir: dist/{{ .version }}
    cmds:
      - task: _package:dist
        vars:
          target: "windows-amd64"

  package:checksum:
    desc: Write sha256 checksums for release assets
    dir: dist/{{ .version }}
    cmds:
      - |
        for asset in *.tar.gz; do
          shasum -a 256 "${asset}" > "${asset}".sha256sum
        done

  build-and-package:
    desc: Build, package and checksum all release binaries
    cmds:
      - task: build:dist:all
      - task: package:dist:all
      - task: package:checksum

  test:
    desc: Run Go tests
    cmds:
      - task: _test:go

  lint:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run ./... --fix --build-tags="{{ .goTags }}"

  lint:check:
    desc: Run golangci-lint without fixes (CI mode)
    cmds:
      - golangci-lint run ./... --build-tags="{{ .goTags }}"

  check:kubectl:
    desc: Check kubectlVersion matches k8s.io/kubectl in go.mod
    cmds:
      - |
        gomod_raw=$(grep 'k8s.io/kubectl ' go.mod | awk '{print $2}')
        if [ -z "${gomod_raw}" ]; then
          echo "ERROR: k8s.io/kubectl not found in go.mod"
          exit 1
        fi
        # go.mod uses v0.Y.Z; kubectl version is v1.Y.Z
        kubectl_from_gomod="v1.${gomod_raw#v0.}"
        if [ "${kubectl_from_gomod}" != "{{ .kubectlVersion }}" ]; then
          echo "ERROR: kubectlVersion mismatch!"
          echo "  Taskfile kubectlVersion : {{ .kubectlVersion }}"
          echo "  go.mod k8s.io/kubectl   : ${gomod_raw} (= ${kubectl_from_gomod})"
          echo "Please update kubectlVersion in Taskfile.yml to match go.mod."
          exit 1
        fi
        echo "kubectlVersion OK: {{ .kubectlVersion }}"

  clean:
    desc: Remove built binaries (build/, dist/, ./d8)
    cmds:
      - rm -rf ./build ./dist ./d8

  release:sign:
    desc: Sign latest tag + origin/main and push signatures
    deps: ["check:kubectl"]
    preconditions:
      - sh: '[[ "{{.CLI_ARGS}}" =~ ^v\d+.\d+.\d+$ ]] || exit 1'
        msg: Provide valid semver prefixed with "v" (eg. task {{.TASK}} -- v1.2.3) to be used as version
    cmds:
      - git fetch --tags -f
      - git signatures pull
      - |
        for ref in {{.refs | default "$(git tag --sort=v:refname | tail -n1) origin/main"}}; do
          echo "Signing $ref..."
          git signatures add {{.CLI_ARGS}} $ref
          git signatures show {{.CLI_ARGS}} $ref
        done
      - git signatures push

  release:publish-trdl-channels:
    desc: Publish release channels to TRDL
    deps: ["check:kubectl"]
    preconditions:
      - sh: test $(git rev-parse --abbrev-ref HEAD) = "main"
        msg: This can only be done on main branch
    prompt:
      - "Have you updated trdl_channels.yaml with new versions?"
    cmds:
      - git add trdl_channels.yaml
      - git commit -S -m 'Signed release channels'
      - git push
      - git fetch
      - git signatures pull
      - git signatures add origin/main
      - git signatures push
